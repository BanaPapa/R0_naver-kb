# KB 시계열 완전 자동 갱신 — PC 불필요한 클라우드 실행.
#
# 매일 10:30 KST에 KB 통계 API로 최신 주간/월간 시계열을 확인하고,
# 새 파일이면: 다운로드 → 인제스트(scripts/kb-ingest.mjs, 무결성 검증 포함)
#            → public/data 커밋(→ Vercel 자동 재배포로 정적 모드 반영)
#            → Supabase Storage 발행(시크릿 등록 시 — supabase 모드용, 선택)
# 같은 파일이면 아무것도 하지 않는다(멱등). 상태는 public/data/.kb-state.json 에 커밋됨.
#
# 시크릿(선택 — Settings > Secrets and variables > Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY  — 없으면 발행만 건너뛰고 커밋 경로는 정상 동작.

name: KB 시계열 자동 갱신

on:
  schedule:
    - cron: '30 1 * * *' # 01:30 UTC = 10:30 KST 매일
  workflow_dispatch: # 수동 실행 버튼

concurrency:
  group: kb-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 전체 npm ci 대신 스크립트가 쓰는 두 패키지만 설치(puppeteer 등 무거운 의존성 회피)
      - name: 의존성 설치
        run: npm install --no-save --no-audit --no-fund xlsx@0.18.5 @supabase/supabase-js@2

      - name: 확인 → 다운로드 → 인제스트 → 발행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/kb-update.mjs --publish

      - name: 변경 데이터 커밋 (변경 있을 때만 → Vercel 자동 재배포)
        run: |
          git add public/data
          if git diff --cached --quiet; then
            echo "데이터 변경 없음 — 커밋 생략"
          else
            git config user.name "kb-data-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "data: KB 시계열 자동 갱신 ($(TZ=Asia/Seoul date +%Y-%m-%d))"
            git push
          fi
